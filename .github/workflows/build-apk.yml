name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⬇️ Download gradle-wrapper.jar automatically
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - name: 🔧 Grant permission
        run: chmod +x gradlew

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
